<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{title}}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f5f7fa;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      }
      .wrapper {
        width: 100%;
        table-layout: fixed;
        background: #f5f7fa;
        padding: 40px 0;
      }
      .main {
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
      .header {
        padding: 32px;
        text-align: center;
        background: #29acfe;
      }
      .logo {
        color: #fff;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .content {
        padding: 40px 32px;
        color: #1f2937;
        line-height: 1.6;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 22px;
        color: #111827;
      }
      p {
        margin: 0 0 16px;
        font-size: 15px;
      }
      .btn {
        display: inline-block;
        background: #48b8fd;
        color: #fff !important;
        text-decoration: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-weight: 600;
        margin: 24px 0;
      }
      .footer {
        padding: 24px 32px;
        text-align: center;
        color: #9ca3af;
        font-size: 12px;
        border-top: 1px solid #f3f4f6;
      }
      @media (max-width: 600px) {
        .content,
        .footer {
          padding: 24px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <table class="main" cellpadding="0" cellspacing="0" role="presentation">
        <tr>
          <td class="header"><div class="logo">FoodHub</div></td>
        </tr>
        <tr>
          <td class="content">
            <h1>{{title}}</h1>
            <p>{{content}}</p>
            {{#if button_url}}
            <a href="{{button_url}}" class="btn">{{button_text}}</a>
            {{/if}}
            <p style="margin-top: 32px">Nếu bạn không thực hiện yêu cầu này, vui lòng bỏ qua email.</p>
          </td>
        </tr>
        <tr>
          <td class="footer">
            © 2026 FoodHub · Hà Đông, Hà Nội<br />
            <a href="{{unsubscribe_url}}" style="color: #9ca3af">Hủy nhận email</a>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
